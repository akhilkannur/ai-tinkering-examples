<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agent Architect</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: #020617; /* Matches Real AI branding */
      color: #f8fafc;
      margin: 0;
    }
    .container { display: flex; flex-direction: column; gap: 16px; height: 100vh; }
    h1 { font-size: 1.2rem; font-weight: bold; color: #f43f5e; margin: 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .status { font-size: 0.75rem; color: #94a3b8; }
    textarea {
      flex: 1;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #f8fafc;
      padding: 12px;
      font-family: "Space Mono", monospace;
      font-size: 0.85rem;
      resize: none;
    }
    textarea:focus { outline: none; border-color: #f43f5e; }
    button {
      background-color: #f43f5e;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #e11d48; }
    button:disabled { background-color: #334155; cursor: not-allowed; }
    .output-label { font-size: 0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Architect</h1>
    <div id="status" class="status">Local AI Engine: Ready</div>
    
    <div class="output-label">Input / Highlighted Text</div>
    <textarea id="inputText" placeholder="Paste messy text here or highlight text on the page..."></textarea>
    
    <button id="transformBtn">Transform for Agent</button>
    
    <div class="output-label">Structured Markdown (.md)</div>
    <textarea id="outputText" readonly placeholder="Structured output will appear here..."></textarea>
    
    <button id="copyBtn" style="background-color: #1e293b; border: 1px solid #334155;">Copy to Clipboard</button>
  </div>
  <script src="panel.js"></script>
</body>
</html>
